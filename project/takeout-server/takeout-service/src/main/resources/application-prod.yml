spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://mysql:3306/takeout?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=true
    username: ${MYSQL_USER:takeout}
    password: ${MYSQL_PASSWORD:takeout123}
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: 6379
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms

logging:
  level:
    com.takeout: INFO
